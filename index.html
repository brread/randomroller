<!DOCTYPE html>
<html>
  <head>
    <title>Flip</title>
    <meta charset="UTF-8" />
    <script>
      var c;
      var d;
      var rn;
      var s;
      let i = 0;
      var msg = " ";
      function f(c) {
        for (let i = 0; i < c; i++) {
          rn = Math.floor(Math.random() * 2 + 1);
          if (rn == 1) {
            rn = "Heads";
          } else if ((rn = 2)) {
            rn = "Tails";
          }
          msg += i + 1 + ": " + rn + "  ";
        }
        alert(msg);
        msg = " ";
      }
      function r(d, s) {
        for (let i = 0; i < d; i++) {
          rn = Math.floor(Math.random() * s + 1);
          msg += i + 1 + ": " + rn + "  ";
        }
        alert(msg);
        msg = " ";
      }
      function isNumeric(n) {
        return !isNaN(parseFloat(n)) && isFinite(n);
      }
      function choose() {
        var a = prompt(
          "Would you like to role dice or flip coins? Press 1 for dice and 2 for coins."
        );
        if (a == 1) {
          d = prompt("How many dice would you like to roll?");
          if (isNumeric(d)) {
            s = prompt("How many sides are on these dice?");
            if (isNumeric(s)) {
              r(d, s);
            } else {
              alert("You did not enter a number.");
            }
          } else {
            alert("You did not enter a number.");
          }
        } else if (a == 2) {
          c = prompt("How many coins would you like to flip?");
          if (isNumeric(c)) {
            f(c);
          } else {
            alert("You did not enter a number.");
          }
        } else {
          alert("You did not choose 1 or 2.");
        }
      }
    </script>
    <style>
      body {
        background-color: rgb(26, 115, 232);
      }
      div {
        text-align: center;
      }
      body {
        background-color: rgb(26, 115, 232);
      }
      div {
        text-align: center;
      }
      #btn {
        border-radius: 4px;
        box-shadow: none;
        box-sizing: border-box;
        font-family: "Google Sans", Roboto, RobotoDraft, Helvetica, Arial,
          sans-serif;
        font-weight: 500;
        font-size: 16px;
        height: 36px;
        letter-spacing: 0.25px;
        line-height: 16px;
        background: rgb(26, 115, 232);
        color: rgb(255, 255, 255);
        padding: 9px 16px 10px 12px;
        text-transform: capitalize;
        border: 1px solid transparent !important;
        margin-top: calc(50vh - 36px);
      }
    </style>
  </head>
  <body>
    <div>
      <button id="btn" onclick="choose();">Flip</button>
    </div>
  </body>
</html>
